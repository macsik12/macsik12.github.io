<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PixelArter 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toolbar">
        <button id="createNewCanvas" class="button">Новый <br>холст</button>
        <div class="sizes">
            <input type="text" placeholder="Размер max=70" id="widthInp"><br>
        </div>
        <div class="colorBlock">
            <input type="color" id="colorInp">
        </div>
        <div class="tools">
            <div class="t1">
                <button class="selected" data-tool="brush">Кисть</button>
                <button data-tool="clearer">Ластик</button>
            </div>
            <div class="t2">
            <button data-tool="lighting">Осветление</button>
            <button data-tool="darking">Затемнение</button>
            </div>
            <div class="t3">
                <button data-tool="colorpicker">Пипетка</button>
                <button data-tool="randomizer">Рандомайзер</button>
            </div>
        </div>
        <div class="colorHistory" id="colorHistory">
        </div>
    </div>
    <div class="canvas" id="canvas">

    </div>
    <div class="bottombar">
        <span>X: <span id="x"></span> Y: <span id="y"></span></span>
    </div>
    <script src="script.js"></script>
</body>
</html>

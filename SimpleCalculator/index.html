<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Простой калькулятор</h1>
    <input type="text" placeholder="Первое число" id="num1_Inp">
    <input type="text" placeholder="Второе число" id="num2_Inp">
    <input type="button" value="+">
    <input type="button" value="-">
    <input type="button" value="*">
    <input type="button" value="/">
    <input type="button" value="%">
    <input type="button" value="**">
    <input type="button" value="/%">
    <br><br>
    <span class="label">Ответ: </span><span id="answer_label" class="answer_label"></span>
    <script src="script.js"></script>
</body>
</html>
